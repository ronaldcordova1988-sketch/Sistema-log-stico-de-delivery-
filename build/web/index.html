<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sistema Logístico de Delivery - Gestión Profesional y Control de Inventarios">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sistema Logístico">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sistema Logístico - Delivery</title>
  
  <link rel="manifest" href="manifest.json">

  <style>
    .loading-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffd700; /* Color amarillo del tema */
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 1000;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000000;">
  
  <!-- Indicador de carga nativo para mejorar la experiencia de arranque -->
  <div id="loading-indicator" class="loading-indicator"></div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading-indicator')?.remove();
    });
  </script>
  
  <footer style="position: fixed; bottom: 10px; right: 10px; color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 12px; z-index: 999;">
    creado por Ing Cordova Ronald
  </footer>
</body>
</html>
