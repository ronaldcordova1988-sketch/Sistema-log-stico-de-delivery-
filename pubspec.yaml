name: sistema_logistico_delivery
description: Sistema profesional de gestión logística y delivery 2026.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Estado y Navegación
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  
  # Base de Datos y Backend
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Utilidades
  uuid: ^4.2.2
  intl: ^0.19.0
  font_awesome_flutter: ^10.6.0
  fl_chart: ^0.66.0
  path_provider: ^2.1.2
  share_plus: ^7.2.2
  pdf: ^3.10.7
  printing: ^5.11.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true