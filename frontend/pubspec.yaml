name: logistics_delivery_system
description: Sistema Completo de Gestión Logística Delivery con 56 Features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # ===== FIREBASE =====
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_messaging: ^14.7.9
  
  # ===== STATE MANAGEMENT =====
  flutter_riverpod: ^2.4.9
  
  # ===== LOCAL STORAGE =====
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # ===== UI/UX =====
  fl_chart: ^0.65.0
  intl: ^0.18.1
  google_fonts: ^6.1.0
  animations: ^2.0.11
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  
  # ===== UTILS =====
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  
  # ===== PDF/EXCEL =====
  pdf: ^3.10.7
  excel: ^4.0.2
  printing: ^5.11.1
  syncfusion_flutter_xlsio: ^24.1.41
  
  # ===== CHARTS & ANALYTICS =====
  charts_flutter: ^0.12.0
  
  # ===== DATE & TIME =====
  table_calendar: ^3.0.9
  
  # ===== HTTP =====
  dio: ^5.4.0
  http: ^1.1.2
  
  # ===== ICONS =====
  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/tutorials/
  
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/fonts/CustomIcons.ttf
